name: 🌐 Organism Deploy Bot — Deployment Validation
# organism-deploy-bot: Validates icp.yaml, checks canister configs, generates deployment manifest
# Part of the Organism Bot Fleet — the deployment nervous system

on:
  push:
    branches: [main]
    paths:
      - 'icp.yaml'
      - 'organism/**'
      - 'src/backend/**'
      - 'src/neuron_fleet/**'
      - 'src/ai_division/**'
      - 'src/organism_token/**'
      - 'src/cycles_bridge/**'
  pull_request:
    paths:
      - 'icp.yaml'
      - 'organism/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-validation:
    name: 🌐 Deployment Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🌐 Validate ICP Configuration
        run: |
          echo "## 🌐 Organism Deploy Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ ! -f "icp.yaml" ]; then
            echo "❌ icp.yaml not found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### ICP Canister Configuration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Canister | Path | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|--------|" >> $GITHUB_STEP_SUMMARY

          ERRORS=0
          while IFS= read -r line; do
            # Extract canister path
            PATH_VAL=$(echo "$line" | sed 's/^[[:space:]]*-[[:space:]]*//')
            [ -z "$PATH_VAL" ] && continue

            if [ -d "$PATH_VAL" ]; then
              # Check for main.mo
              if [ -f "${PATH_VAL}/main.mo" ]; then
                echo "| $(basename $PATH_VAL) | $PATH_VAL | ✅ main.mo found |" >> $GITHUB_STEP_SUMMARY
              elif [ -d "${PATH_VAL}/src" ]; then
                echo "| $(basename $PATH_VAL) | $PATH_VAL | ✅ src/ found |" >> $GITHUB_STEP_SUMMARY
              else
                echo "| $(basename $PATH_VAL) | $PATH_VAL | ⚠️ no main.mo |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $(basename $PATH_VAL) | $PATH_VAL | ❌ directory missing |" >> $GITHUB_STEP_SUMMARY
              ERRORS=$((ERRORS + 1))
            fi
          done < <(grep '^\s*-' icp.yaml)

          if [ $ERRORS -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ $ERRORS canister path(s) not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🌐 Validate Cloudflare Workers
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Cloudflare Worker Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "organism/cloudflare/wrangler.toml" ]; then
            WORKER_COUNT=$(grep -c '\[env\.\|name\s*=' organism/cloudflare/wrangler.toml 2>/dev/null || echo "?")
            echo "- **wrangler.toml**: ✅ Found" >> $GITHUB_STEP_SUMMARY
            echo "- **Gateway**: organism/cloudflare/index.js $([ -f organism/cloudflare/index.js ] && echo '✅' || echo '❌')" >> $GITHUB_STEP_SUMMARY
            echo "- **AGI Brains**: $(ls organism/cloudflare/*.js 2>/dev/null | grep -v index.js | wc -l)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ wrangler.toml not found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🌐 Generate Deployment Manifest
        run: |
          REPORT="docs/deployment-manifest.md"
          mkdir -p docs

          echo "# 🌐 Deployment Manifest" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-deploy-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## ICP Canisters" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Canister | Type | Entry |" >> "$REPORT"
          echo "|----------|------|-------|" >> "$REPORT"
          while IFS= read -r line; do
            PATH_VAL=$(echo "$line" | sed 's/^[[:space:]]*-[[:space:]]*//')
            [ -z "$PATH_VAL" ] && continue
            NAME=$(basename "$PATH_VAL")
            TYPE="unknown"
            if [ -f "${PATH_VAL}/main.mo" ]; then
              TYPE="Motoko"
            elif ls "${PATH_VAL}"/*.ts 2>/dev/null | head -1 > /dev/null; then
              TYPE="TypeScript"
            fi
            echo "| $NAME | $TYPE | $PATH_VAL |" >> "$REPORT"
          done < <(grep '^\s*-' icp.yaml)

          echo "" >> "$REPORT"
          echo "## Cloudflare Workers" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Worker | File |" >> "$REPORT"
          echo "|--------|------|" >> "$REPORT"
          for f in organism/cloudflare/*.js; do
            [ -f "$f" ] || continue
            [ "$(basename $f)" = "index.js" ] && continue
            echo "| $(basename $f .js) | $f |" >> "$REPORT"
          done

          echo "" >> "$REPORT"
          echo "## Web Worker Fleet" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Worker | File |" >> "$REPORT"
          echo "|--------|------|" >> "$REPORT"
          for f in organism/web/*-worker.js; do
            [ -f "$f" ] || continue
            echo "| $(basename $f .js) | $f |" >> "$REPORT"
          done

          echo "" >> "$REPORT"
          echo "## Deployment Targets" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "- **ICP Mainnet**: command-platform.caffeine.ai" >> "$REPORT"
          echo "- **Cloudflare Edge**: wrangler.toml (organism/cloudflare/)" >> "$REPORT"
          echo "- **PWA**: Served from ICP canister" >> "$REPORT"

      - name: 🌐 Commit Manifest
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-deploy-bot"
          git config user.email "organism-deploy-bot[bot]@users.noreply.github.com"
          git add docs/deployment-manifest.md
          git diff --staged --quiet || git commit -m "🌐 organism-deploy-bot: update deployment manifest"
          git push || true

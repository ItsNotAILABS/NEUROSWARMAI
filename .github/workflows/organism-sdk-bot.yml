name: 📦 Organism SDK Bot — SDK Packaging & Validation
# organism-sdk-bot: Validates & normalizes SDKs for npm publish; creates tarballs
# Part of the Organism Bot Fleet — the distribution packaging layer

on:
  push:
    branches: [main]
    paths:
      - 'organism/web/**'
      - 'package.json'
  pull_request:
    paths:
      - 'organism/web/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sdk-validation:
    name: 📦 SDK Validation & Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Validate Package Structure
        run: |
          echo "## 📦 Organism SDK Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Check root package.json
          if [ -f "package.json" ]; then
            NAME=$(node -e "console.log(require('./package.json').name || 'unnamed')")
            VERSION=$(node -e "console.log(require('./package.json').version || '0.0.0')")
            echo "- **Root Package**: $NAME@$VERSION" >> $GITHUB_STEP_SUMMARY
          fi

          # Validate worker modules as SDK components
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Web Worker SDK Components" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Worker | Lines | Exports | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          for f in organism/web/*-worker.js; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f" .js)
            LINES=$(wc -l < "$f")
            HAS_EXPORT="❌"
            if grep -q "onmessage\|addEventListener\|postMessage" "$f"; then
              HAS_EXPORT="✅"
            fi
            echo "| $NAME | $LINES | $HAS_EXPORT | $([ "$HAS_EXPORT" = "✅" ] && echo "ready" || echo "needs fix") |" >> $GITHUB_STEP_SUMMARY
          done

      - name: 📦 Create SDK Tarballs
        run: |
          mkdir -p dist/sdk

          # Package web workers as SDK
          tar czf dist/sdk/organism-web-workers.tar.gz \
            -C organism/web . \
            --exclude='*.map' --exclude='node_modules'
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- organism-web-workers.tar.gz ($(du -h dist/sdk/organism-web-workers.tar.gz | cut -f1))" >> $GITHUB_STEP_SUMMARY

          # Package cloudflare workers as SDK
          tar czf dist/sdk/organism-cloudflare-ais.tar.gz \
            -C organism/cloudflare . \
            --exclude='*.map' --exclude='node_modules'
          echo "- organism-cloudflare-ais.tar.gz ($(du -h dist/sdk/organism-cloudflare-ais.tar.gz | cut -f1))" >> $GITHUB_STEP_SUMMARY

          # Package Julia engines as SDK
          tar czf dist/sdk/organism-engines.tar.gz \
            -C src/engines . \
            --exclude='*.map'
          echo "- organism-engines.tar.gz ($(du -h dist/sdk/organism-engines.tar.gz | cut -f1))" >> $GITHUB_STEP_SUMMARY

      - name: 📦 Generate SDK Reference
        run: |
          REPORT="docs/sdk-reference.md"
          mkdir -p docs

          echo "# 📦 SDK Reference" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-sdk-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## SDK Packages" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Package | Contents | Size |" >> "$REPORT"
          echo "|---------|----------|------|" >> "$REPORT"

          for f in dist/sdk/*.tar.gz; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f")
            SIZE=$(du -h "$f" | cut -f1)
            COUNT=$(tar tzf "$f" | wc -l)
            echo "| $NAME | $COUNT files | $SIZE |" >> "$REPORT"
          done

      - name: 📦 Upload SDK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: organism-sdks
          path: dist/sdk/
          retention-days: 30

      - name: 📦 Commit SDK Reference
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-sdk-bot"
          git config user.email "organism-sdk-bot[bot]@users.noreply.github.com"
          git add docs/sdk-reference.md
          git diff --staged --quiet || git commit -m "📦 organism-sdk-bot: update SDK reference"
          git push || true

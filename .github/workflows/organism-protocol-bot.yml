name: 🔬 Organism Protocol Bot — Protocol Integrity
# organism-protocol-bot: Lints all protocols, categorizes by domain, detects circular deps
# Part of the Organism Bot Fleet — the regulatory nervous system

on:
  push:
    branches: [main]
    paths:
      - 'organism/web/protocols-worker.js'
      - 'organism/web/orchestrator.js'
      - 'languages/*.spec'
      - 'atlas/**'
  pull_request:
    paths:
      - 'organism/web/protocols-worker.js'
      - 'organism/web/orchestrator.js'
      - 'languages/*.spec'
      - 'atlas/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  protocol-integrity:
    name: 🔬 Protocol Integrity Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔬 Lint Protocol Registry
        run: |
          echo "## 🔬 Organism Protocol Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PROTOCOL_FILE="organism/web/protocols-worker.js"
          if [ ! -f "$PROTOCOL_FILE" ]; then
            echo "⚠️ Protocol registry not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Count protocols
          PROTOCOL_COUNT=$(grep -c "id:" "$PROTOCOL_FILE" 2>/dev/null || echo 0)
          echo "- **Protocols Found**: $PROTOCOL_COUNT" >> $GITHUB_STEP_SUMMARY

          # Check for Latin names
          LATIN_COUNT=$(grep -c "latinName:" "$PROTOCOL_FILE" 2>/dev/null || echo 0)
          echo "- **Latin Named**: $LATIN_COUNT" >> $GITHUB_STEP_SUMMARY

          # Check for duplicate IDs
          DUPES=$(grep -oP "id:\s*\K\d+" "$PROTOCOL_FILE" | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⚠️ Duplicate Protocol IDs" >> $GITHUB_STEP_SUMMARY
            echo "$DUPES" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Duplicates**: None ✅" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔬 Validate Worker Cross-References
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Worker Cross-Reference Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ORCHESTRATOR="organism/web/orchestrator.js"
          if [ ! -f "$ORCHESTRATOR" ]; then
            echo "⚠️ Orchestrator not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Check each worker referenced in orchestrator exists
          MISSING=0
          for worker in organism/web/*-worker.js; do
            [ -f "$worker" ] || continue
            WNAME=$(basename "$worker")
            if ! grep -q "$WNAME" "$ORCHESTRATOR"; then
              echo "  - ⚠️ **$WNAME** not registered in orchestrator" >> $GITHUB_STEP_SUMMARY
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -eq 0 ]; then
            echo "✅ All workers properly registered in orchestrator" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔬 Validate Language Registry
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Language Registry Integrity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          REGISTRY="atlas/registry/global_registry.jsonl"
          if [ ! -f "$REGISTRY" ]; then
            echo "⚠️ Global registry not found" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          REG_COUNT=$(wc -l < "$REGISTRY")
          SPEC_COUNT=$(ls languages/*.spec 2>/dev/null | wc -l)
          echo "- **Registry entries**: $REG_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "- **Spec files**: $SPEC_COUNT" >> $GITHUB_STEP_SUMMARY

          if [ "$REG_COUNT" -ne "$SPEC_COUNT" ]; then
            echo "- ⚠️ **Mismatch**: registry ($REG_COUNT) ≠ specs ($SPEC_COUNT)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ✅ Registry and specs in sync" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 🔬 Generate Protocol Encyclopedia
        run: |
          REPORT="docs/protocol-encyclopedia.md"
          mkdir -p docs

          echo "# 🔬 Protocol Encyclopedia" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-protocol-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## Protocol Statistics" >> "$REPORT"
          echo "" >> "$REPORT"
          PROTOCOL_FILE="organism/web/protocols-worker.js"
          if [ -f "$PROTOCOL_FILE" ]; then
            PROTOCOL_COUNT=$(grep -c "id:" "$PROTOCOL_FILE" 2>/dev/null || echo 0)
            LATIN_COUNT=$(grep -c "latinName:" "$PROTOCOL_FILE" 2>/dev/null || echo 0)
            echo "- **Total Protocols**: $PROTOCOL_COUNT" >> "$REPORT"
            echo "- **Latin Named**: $LATIN_COUNT" >> "$REPORT"
          fi

          echo "" >> "$REPORT"
          echo "## Language Specs" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Language | Domain | Status |" >> "$REPORT"
          echo "|----------|--------|--------|" >> "$REPORT"
          for f in languages/*.spec; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f" .spec | tr '[:lower:]' '[:upper:]')
            # Extract domain from YAML front-matter
            DOMAIN=$(sed -n '/^---$/,/^---$/p' "$f" | grep "domain:" | head -1 | sed 's/.*domain:[[:space:]]*//' | tr -d '"' | tr -d "'")
            STATUS=$(sed -n '/^---$/,/^---$/p' "$f" | grep "status:" | head -1 | sed 's/.*status:[[:space:]]*//' | tr -d '"' | tr -d "'")
            echo "| $NAME | ${DOMAIN:-—} | ${STATUS:-—} |" >> "$REPORT"
          done

      - name: 🔬 Commit Encyclopedia
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-protocol-bot"
          git config user.email "organism-protocol-bot[bot]@users.noreply.github.com"
          git add docs/protocol-encyclopedia.md
          git diff --staged --quiet || git commit -m "🔬 organism-protocol-bot: update protocol encyclopedia"
          git push || true

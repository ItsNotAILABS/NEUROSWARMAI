name: 🧠 Organism Neural Bot — Deep AI Architecture Validation
# organism-neural-bot: Validates protocols, agents, runtimes; builds neural dependency graph
# Part of the Organism Bot Fleet — the brain's self-validation layer

on:
  push:
    branches: [main]
    paths:
      - 'organism/**'
      - 'src/engines/**'
      - 'languages/**'
      - 'atlas/**'
  pull_request:
    paths:
      - 'organism/**'
      - 'src/engines/**'
      - 'languages/**'
      - 'atlas/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  neural-validation:
    name: 🧠 Neural Architecture Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🧠 Validate Web Worker Fleet
        id: workers
        run: |
          echo "## 🧠 Neural Bot — Web Worker Fleet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          WORKER_COUNT=$(ls organism/web/*-worker.js 2>/dev/null | wc -l)
          echo "- **Web Workers**: $WORKER_COUNT" >> $GITHUB_STEP_SUMMARY

          # Validate each worker has proper message handler
          VALID=0
          INVALID=0
          for f in organism/web/*-worker.js; do
            [ -f "$f" ] || continue
            if grep -q "onmessage\|addEventListener.*message" "$f"; then
              VALID=$((VALID + 1))
            else
              INVALID=$((INVALID + 1))
              echo "  ⚠️ Missing message handler: $f" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "- **Valid handlers**: $VALID / $((VALID + INVALID))" >> $GITHUB_STEP_SUMMARY
          echo "WORKER_COUNT=$WORKER_COUNT" >> $GITHUB_OUTPUT

      - name: 🧠 Validate Cloudflare AGI Fleet
        id: ais
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧠 Neural Bot — Cloudflare AGI Fleet" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          AIS_COUNT=$(ls organism/cloudflare/*.js 2>/dev/null | grep -v index.js | wc -l)
          echo "- **AGI Brains**: $AIS_COUNT" >> $GITHUB_STEP_SUMMARY

          # Validate each has export default
          VALID=0
          for f in organism/cloudflare/*.js; do
            [ -f "$f" ] || continue
            [ "$(basename $f)" = "index.js" ] && continue
            if grep -q "export default\|module.exports\|addEventListener.*fetch" "$f"; then
              VALID=$((VALID + 1))
            else
              echo "  ⚠️ Missing export: $(basename $f)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "- **Valid exports**: $VALID / $AIS_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "AIS_COUNT=$AIS_COUNT" >> $GITHUB_OUTPUT

      - name: 🧠 Validate Julia Engines
        id: engines
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧠 Neural Bot — Julia Governance Engines" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ENGINE_COUNT=$(ls src/engines/*.jl 2>/dev/null | wc -l)
          echo "- **Engines**: $ENGINE_COUNT" >> $GITHUB_STEP_SUMMARY

          for f in src/engines/*.jl; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f" .jl)
            if grep -q "^module " "$f"; then
              echo "  - ✅ $NAME (module found)" >> $GITHUB_STEP_SUMMARY
            else
              echo "  - ⚠️ $NAME (no module declaration)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "ENGINE_COUNT=$ENGINE_COUNT" >> $GITHUB_OUTPUT

      - name: 🧠 Validate Language Specs
        id: langs
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🧠 Neural Bot — Cognitive Language Specs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          SPEC_COUNT=$(ls languages/*.spec 2>/dev/null | wc -l)
          echo "- **Language Specs**: $SPEC_COUNT" >> $GITHUB_STEP_SUMMARY

          VALID=0
          for f in languages/*.spec; do
            [ -f "$f" ] || continue
            if head -1 "$f" | grep -q "^---"; then
              VALID=$((VALID + 1))
            else
              echo "  ⚠️ Missing YAML front-matter: $(basename $f)" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "- **Valid front-matter**: $VALID / $SPEC_COUNT" >> $GITHUB_STEP_SUMMARY
          echo "SPEC_COUNT=$SPEC_COUNT" >> $GITHUB_OUTPUT

      - name: 🧠 Build Neural Dependency Graph
        run: |
          REPORT="docs/neural-architecture.md"
          mkdir -p docs

          echo "# 🧠 Neural Architecture Map" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-neural-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "## Fleet Summary" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Layer | Component | Count |" >> "$REPORT"
          echo "|-------|-----------|-------|" >> "$REPORT"
          echo "| Web Workers | organism/web/*-worker.js | $(ls organism/web/*-worker.js 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| Cloudflare AGI | organism/cloudflare/*.js | $(ls organism/cloudflare/*.js 2>/dev/null | grep -v index.js | wc -l) |" >> "$REPORT"
          echo "| Julia Engines | src/engines/*.jl | $(ls src/engines/*.jl 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| Language Specs | languages/*.spec | $(ls languages/*.spec 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| ICP Canisters | icp.yaml entries | $(grep -c '^\s*-' icp.yaml 2>/dev/null || echo 0) |" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## Web Worker → Engine Dependencies" >> "$REPORT"
          echo "\`\`\`" >> "$REPORT"
          echo "orchestrator.js" >> "$REPORT"
          for f in organism/web/*-worker.js; do
            echo "  ├── $(basename $f)" >> "$REPORT"
          done
          echo "\`\`\`" >> "$REPORT"

          echo "" >> "$REPORT"
          echo "## Cloudflare AGI Tiers" >> "$REPORT"
          echo "\`\`\`" >> "$REPORT"
          echo "index.js (fleet gateway)" >> "$REPORT"
          for f in organism/cloudflare/*.js; do
            [ "$(basename $f)" = "index.js" ] && continue
            echo "  ├── $(basename $f .js)" >> "$REPORT"
          done
          echo "\`\`\`" >> "$REPORT"

      - name: 🧠 Commit Architecture Map
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-neural-bot"
          git config user.email "organism-neural-bot[bot]@users.noreply.github.com"
          git add docs/neural-architecture.md
          git diff --staged --quiet || git commit -m "🧠 organism-neural-bot: update neural architecture map"
          git push || true

name: 🧬 Organism Build Bot — Extension Packaging
# organism-build-bot: Zips all browser extensions for distribution
# Part of the Organism Bot Fleet — the nervous system's packaging layer

on:
  push:
    branches: [main]
    paths:
      - 'extension/**'
  pull_request:
    paths:
      - 'extension/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-extensions:
    name: 🧬 Package Browser Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🧬 Discover Extensions
        id: discover
        run: |
          echo "## 🧬 Organism Build Bot — Extension Discovery" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          EXTENSIONS=()
          for dir in extension/*/; do
            if [ -f "${dir}manifest.json" ]; then
              NAME=$(basename "$dir")
              VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' "${dir}manifest.json" | head -1 | grep -o '"[^"]*"$' | tr -d '"')
              EXTENSIONS+=("$NAME")
              echo "- **$NAME** v${VERSION:-unknown}" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "EXTENSION_COUNT=${#EXTENSIONS[@]}" >> $GITHUB_OUTPUT
          echo "Found ${#EXTENSIONS[@]} extensions"

      - name: 🧬 Package All Extensions
        run: |
          mkdir -p dist/extensions
          REPORT="docs/extension-catalog.md"
          mkdir -p docs

          echo "# 🧬 Extension Catalog" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-build-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Extension | Version | Files | Size |" >> "$REPORT"
          echo "|-----------|---------|-------|------|" >> "$REPORT"

          for dir in extension/*/; do
            [ -f "${dir}manifest.json" ] || continue
            NAME=$(basename "$dir")
            VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' "${dir}manifest.json" | head -1 | grep -o '"[^"]*"$' | tr -d '"')
            VERSION="${VERSION:-0.0.0}"

            ZIP_NAME="${NAME}-v${VERSION}.zip"
            cd "$dir"
            zip -r "../../dist/extensions/${ZIP_NAME}" . \
              -x "*.DS_Store" -x "__MACOSX/*" -x "*.map" -x "node_modules/*" -x ".git/*"
            cd ../..

            FILE_COUNT=$(unzip -l "dist/extensions/${ZIP_NAME}" | tail -1 | awk '{print $2}')
            SIZE=$(du -h "dist/extensions/${ZIP_NAME}" | cut -f1)
            echo "| $NAME | $VERSION | $FILE_COUNT | $SIZE |" >> "$REPORT"
            echo "✅ Packaged $NAME v$VERSION → $ZIP_NAME ($SIZE)"
          done

          echo "" >> "$REPORT"
          echo "## Build Info" >> "$REPORT"
          echo "- **Commit**: \`${GITHUB_SHA:0:8}\`" >> "$REPORT"
          echo "- **Branch**: \`${GITHUB_REF_NAME}\`" >> "$REPORT"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          ls -la dist/extensions/ >> $GITHUB_STEP_SUMMARY

      - name: 🧬 Upload Extension Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: organism-extensions
          path: dist/extensions/
          retention-days: 30

      - name: 🧬 Commit Catalog
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-build-bot"
          git config user.email "organism-build-bot[bot]@users.noreply.github.com"
          git add docs/extension-catalog.md
          git diff --staged --quiet || git commit -m "🧬 organism-build-bot: update extension catalog"
          git push || true

name: 📚 Organism Docs Bot — Auto-Documentation
# organism-docs-bot: Generates extension catalog, protocol encyclopedia, SDK reference, architecture map
# Part of the Organism Bot Fleet — the memory surface layer

on:
  push:
    branches: [main]
    paths:
      - 'organism/**'
      - 'extension/**'
      - 'languages/**'
      - 'atlas/**'
      - 'src/engines/**'
      - 'governance/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-docs:
    name: 📚 Generate Living Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 📚 Generate Architecture Map
        run: |
          REPORT="docs/architecture-map.md"
          mkdir -p docs

          echo "# 📚 Organism Architecture Map" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Generated by organism-docs-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## System Overview" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "\`\`\`" >> "$REPORT"
          echo "┌─────────────────────────────────────────────────┐" >> "$REPORT"
          echo "│              MERIDIANUS ORGANISM                │" >> "$REPORT"
          echo "├─────────────────┬───────────────────────────────┤" >> "$REPORT"
          echo "│ Browser Layer   │ Extension (Chrome/Edge)       │" >> "$REPORT"
          echo "│ Frontend Layer  │ React + PWA (ICP Canister)    │" >> "$REPORT"
          echo "│ Worker Layer    │ $(ls organism/web/*-worker.js 2>/dev/null | wc -l) Web Workers (φ-heartbeat)     │" >> "$REPORT"
          echo "│ Edge Layer      │ $(ls organism/cloudflare/*.js 2>/dev/null | grep -v index.js | wc -l) Cloudflare AGI Brains       │" >> "$REPORT"
          echo "│ Governance      │ $(ls src/engines/*.jl 2>/dev/null | wc -l) Julia Engines                │" >> "$REPORT"
          echo "│ Language Layer  │ $(ls languages/*.spec 2>/dev/null | wc -l) Cognitive Language Specs     │" >> "$REPORT"
          echo "│ Canister Layer  │ $(grep -c '^\s*-' icp.yaml 2>/dev/null || echo 0) ICP Canisters                │" >> "$REPORT"
          echo "│ Governance Mem  │ $(ls governance/memory/*.mml 2>/dev/null | wc -l) Memory Layers (MML)          │" >> "$REPORT"
          echo "└─────────────────┴───────────────────────────────┘" >> "$REPORT"
          echo "\`\`\`" >> "$REPORT"
          echo "" >> "$REPORT"

          # Bot Fleet documentation
          echo "## 🤖 Bot Fleet" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Bot | Emoji | Domain | Trigger |" >> "$REPORT"
          echo "|-----|-------|--------|---------|" >> "$REPORT"
          echo "| organism-build-bot | 🧬 | Extension Packaging | Push to extension/ |" >> "$REPORT"
          echo "| organism-neural-bot | 🧠 | AI Architecture | Push to organism/, engines/, languages/ |" >> "$REPORT"
          echo "| organism-sdk-bot | 📦 | SDK Packaging | Push to organism/web/, package.json |" >> "$REPORT"
          echo "| organism-protocol-bot | 🔬 | Protocol Integrity | Push to protocols, languages/ |" >> "$REPORT"
          echo "| organism-test-bot | 🧪 | Cross-Matrix Testing | Push to organism/, src/ |" >> "$REPORT"
          echo "| organism-docs-bot | 📚 | Auto-Documentation | Push to any source |" >> "$REPORT"
          echo "| organism-release-bot | 🚀 | Production Releases | Version tags (v*) |" >> "$REPORT"
          echo "| organism-deploy-bot | 🌐 | Deployment | Push to icp.yaml, organism/ |" >> "$REPORT"
          echo "| organism-sentinel-bot | 🛡️ | Security | Weekly + every push |" >> "$REPORT"
          echo "" >> "$REPORT"

          # Governance engines
          echo "## ⚖️ Governance Engines" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Engine | File | Purpose |" >> "$REPORT"
          echo "|--------|------|---------|" >> "$REPORT"
          for f in src/engines/*.jl; do
            [ -f "$f" ] || continue
            NAME=$(basename "$f" .jl)
            # Extract module doc comment
            DESC=$(grep -A1 "^module " "$f" | tail -1 | sed 's/^#[[:space:]]*//' | head -c 60)
            echo "| $NAME | $(basename $f) | ${DESC:-Governance engine} |" >> "$REPORT"
          done
          echo "" >> "$REPORT"

          # Governance memory
          echo "## 🧠 Governance Memory (D1: Self-Reflective Brain)" >> "$REPORT"
          echo "" >> "$REPORT"
          for f in governance/memory/*.mml; do
            [ -f "$f" ] || continue
            echo "- **$(basename $f)**: $(head -3 "$f" | grep -v '^#' | head -1)" >> "$REPORT"
          done
          echo "" >> "$REPORT"

          echo "## 📊 Summary Statistics" >> "$REPORT"
          echo "" >> "$REPORT"
          TOTAL_JS=$(find organism/ -name "*.js" 2>/dev/null | wc -l)
          TOTAL_JL=$(find src/engines/ -name "*.jl" 2>/dev/null | wc -l)
          TOTAL_MO=$(find src/ -name "*.mo" 2>/dev/null | wc -l)
          TOTAL_SPEC=$(ls languages/*.spec 2>/dev/null | wc -l)
          TOTAL_LINES=$(find organism/ src/engines/ languages/ -name "*.js" -o -name "*.jl" -o -name "*.spec" 2>/dev/null | xargs wc -l 2>/dev/null | tail -1 | awk '{print $1}')
          echo "- **Total JS files**: $TOTAL_JS" >> "$REPORT"
          echo "- **Total Julia engines**: $TOTAL_JL" >> "$REPORT"
          echo "- **Total Motoko canisters**: $TOTAL_MO" >> "$REPORT"
          echo "- **Total Language specs**: $TOTAL_SPEC" >> "$REPORT"
          echo "- **Total Lines**: ~$TOTAL_LINES" >> "$REPORT"

      - name: 📚 Commit Documentation
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "organism-docs-bot"
          git config user.email "organism-docs-bot[bot]@users.noreply.github.com"
          git add docs/architecture-map.md
          git diff --staged --quiet || git commit -m "📚 organism-docs-bot: update architecture map"
          git push || true

      - name: 📚 Summary
        run: |
          echo "## 📚 Organism Docs Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated documentation:" >> $GITHUB_STEP_SUMMARY
          echo "- docs/architecture-map.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Other bots generate:" >> $GITHUB_STEP_SUMMARY
          echo "- docs/extension-catalog.md (build-bot)" >> $GITHUB_STEP_SUMMARY
          echo "- docs/neural-architecture.md (neural-bot)" >> $GITHUB_STEP_SUMMARY
          echo "- docs/sdk-reference.md (sdk-bot)" >> $GITHUB_STEP_SUMMARY
          echo "- docs/protocol-encyclopedia.md (protocol-bot)" >> $GITHUB_STEP_SUMMARY
          echo "- docs/health-dashboard.md (test-bot)" >> $GITHUB_STEP_SUMMARY
          echo "- docs/security-audit.md (sentinel-bot)" >> $GITHUB_STEP_SUMMARY

      # ── Auto-track: convert TODO markers to GitHub Issues ─────────────────
      - name: "[LEGATUS] Convert TODO debt to tracked GitHub Issues"
        id: todo_issues
        uses: actions/github-script@v7
        continue-on-error: true
        env:
          TODO_COUNT: ${{ steps.todo_debt.outputs.todos }}
        with:
          script: |
            if (parseInt(process.env.TODO_COUNT || '0') === 0) {
              core.setOutput('converted', '0');
              return;
            }

            const { execSync } = require('child_process');

            // Grep for TODO/FIXME/HACK with file + line context
            let todoLines = '';
            try {
              todoLines = execSync(
                'grep -rn "TODO\\|FIXME\\|HACK" organism/web/ organism/cloudflare/ src/frontend/src/ ' +
                '--include="*.js" --include="*.ts" --include="*.tsx" ' +
                '--exclude-dir=node_modules --exclude-dir=dist 2>/dev/null | head -20',
                { encoding: 'utf8' }
              ).trim();
            } catch {}

            if (!todoLines) { core.setOutput('converted', '0'); return; }

            // Get existing todo-tracked issues to prevent duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'todo-tracked', per_page: 100
            });
            const existingSignatures = new Set(
              existing.data.map(i => {
                const m = i.body?.match(/\*\*File:\*\* `([^`]+)`.*\*\*Line:\*\* (\d+)/s);
                return m ? `${m[1]}:${m[2]}` : '';
              }).filter(Boolean)
            );

            // Ensure label exists
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: 'todo-tracked', color: 'e4e669',
                description: 'TODO/FIXME/HACK marker tracked as a work item — BOT-010 LEGATUS'
              });
            } catch {}

            let converted = 0;
            const lines = todoLines.split('\n').filter(Boolean).slice(0, 10);

            for (const line of lines) {
              const match = line.match(/^([^:]+):(\d+):\s*(.+)$/);
              if (!match) continue;
              const [, file, lineNum, content] = match;
              const sig = `${file}:${lineNum}`;
              if (existingSignatures.has(sig)) continue;

              const markerType = content.includes('FIXME') ? 'FIXME'
                               : content.includes('HACK') ? 'HACK' : 'TODO';
              const todoText = content.replace(/.*(?:TODO|FIXME|HACK):?\s*/i, '').trim();

              const body = [
                `## 📌 [LEGATUS] ${markerType} Debt Tracked`,
                '',
                `**File:** \`${file}\`  `,
                `**Line:** ${lineNum}  `,
                `**Marker:** ${markerType}`,
                '',
                '### Code Context',
                '```',
                content.trim().slice(0, 200),
                '```',
                '',
                '### Task',
                todoText.length > 8 ? todoText : `Address the ${markerType} marker at \`${file}:${lineNum}\`.`,
                '',
                '**Resolution:** Implement the intended functionality and remove this marker, or document why it is deferred.',
                '',
                '---',
                '*Auto-tracked by BOT-010 · LEGATUS v2.0.0 — Legatus et Arbiter*',
                '*Medina Doctrine · Copyright © 2024–2026 Alfredo Medina Hernandez*',
              ].join('\n');

              try {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: `[LEGATUS] ${markerType}: ${(todoText || `${file}:${lineNum}`).slice(0, 70)}`,
                  body,
                  labels: ['organism-bot', 'todo-tracked', 'code-debt']
                });
                existingSignatures.add(sig);
                converted++;
                console.log(`Tracked: ${sig}`);
              } catch (e) { console.log(`Skip ${sig}: ${e.message}`); }
            }

            console.log(`Converted ${converted} TODO markers to tracked issues.`);
            core.setOutput('converted', String(converted));

      # ── Compute overall status ─────────────────────────────────────────────
      - name: "[LEGATUS] Compute quality status"
        id: set-output
        run: |
          SCORE="${{ steps.aggregate.outputs.score }}"
          GRADE="${{ steps.aggregate.outputs.grade }}"
          echo "status=${GRADE}" >> $GITHUB_OUTPUT
          echo "score=${SCORE}" >> $GITHUB_OUTPUT
          echo "summary=${{ steps.aggregate.outputs.emoji }} LEGATUS: quality score ${SCORE}/100 (${GRADE})" >> $GITHUB_OUTPUT

      - name: "[LEGATUS] Final status"
        run: echo "${{ steps.set-output.outputs.summary }}"

      # ── Auto-fix: repair invalid JSON files ───────────────────────────────
      - name: "[LEGATUS] Auto-fix invalid JSON configuration files"
        id: fix_json
        continue-on-error: true
        run: |
          node - <<'JSEOF'
          const fs = require('fs'), path = require('path');
          const { execSync } = require('child_process');

          let jsonFiles = [];
          try {
            jsonFiles = execSync(
              'find . -name "*.json" -not -path "*/node_modules/*" -not -path "*/.git/*" -not -path "*/dist/*" -not -path "*/.pnpm-store/*"',
              { encoding: 'utf8' }
            ).trim().split('\n').filter(Boolean);
          } catch {}

          const fixed = [], stillBroken = [];

          for (const f of jsonFiles) {
            let raw;
            try { raw = fs.readFileSync(f, 'utf8'); } catch { continue; }
            try {
              JSON.parse(raw); // Already valid — skip
            } catch {
              // Attempt repair: remove BOM, trailing commas, comments
              try {
                const cleaned = raw
                  .replace(/^\uFEFF/, '')             // BOM
                  .replace(/\/\/[^\n"]*/g, '')         // // line comments
                  .replace(/\/\*[\s\S]*?\*\//g, '')    // /* block comments */
                  .replace(/,(\s*[}\]])/g, '$1');      // trailing commas
                const parsed = JSON.parse(cleaned);
                fs.writeFileSync(f, JSON.stringify(parsed, null, 2) + '\n');
                fixed.push(f);
                console.log('Fixed: ' + f);
              } catch (e) {
                stillBroken.push(f + ': ' + e.message.slice(0, 60));
              }
            }
          }

          fs.writeFileSync('/tmp/legatus_fixed_json.txt', fixed.join('\n'));
          console.log('fixed_count=' + fixed.length);
          console.log('fixed_files=' + fixed.join('|'));
          console.log('broken_count=' + stillBroken.length);
          JSEOF

          FIXED_COUNT=$(node -e "
            const fs = require('fs');
            const f = fs.readFileSync('/tmp/legatus_fixed_json.txt','utf8').trim();
            console.log(f ? f.split('\n').filter(Boolean).length : 0);
          " 2>/dev/null || echo 0)
          FIXED_FILES=$(cat /tmp/legatus_fixed_json.txt 2>/dev/null | tr '\n' '|' | sed 's/|$//')
          echo "json_fixed=${FIXED_COUNT}" >> $GITHUB_OUTPUT
          echo "json_fixed_files=${FIXED_FILES}" >> $GITHUB_OUTPUT

      # ── Auto-fix: create PR for repaired JSON files ────────────────────────

name: 🚀 Organism Release Bot — Production Releases
# organism-release-bot: Builds everything, generates changelog, creates GitHub Release with all artifacts
# Part of the Organism Bot Fleet — the production deployment layer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-all:
    name: 🚀 Build All Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 🚀 Build Frontend
        run: |
          pnpm install --no-frozen-lockfile
          cd src/frontend
          pnpm run build:skip-bindings || echo "Frontend build skipped (bindings not available)"

      - name: 🚀 Package Extensions
        run: |
          mkdir -p dist/release
          for dir in extension/*/; do
            [ -f "${dir}manifest.json" ] || continue
            NAME=$(basename "$dir")
            VERSION=$(grep -o '"version"[[:space:]]*:[[:space:]]*"[^"]*"' "${dir}manifest.json" | head -1 | grep -o '"[^"]*"$' | tr -d '"')
            cd "$dir"
            zip -r "../../dist/release/${NAME}-v${VERSION:-0.0.0}.zip" . \
              -x "*.DS_Store" -x "__MACOSX/*" -x "node_modules/*"
            cd ../..
          done

      - name: 🚀 Package SDKs
        run: |
          tar czf dist/release/organism-web-workers.tar.gz -C organism/web .
          tar czf dist/release/organism-cloudflare-ais.tar.gz -C organism/cloudflare .
          tar czf dist/release/organism-engines.tar.gz -C src/engines .
          tar czf dist/release/organism-languages.tar.gz -C languages .

      - name: 🚀 Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          REPORT="dist/release/CHANGELOG.md"

          echo "# MERIDIANUS ${GITHUB_REF_NAME} — Release Notes" > "$REPORT"
          echo "" >> "$REPORT"
          echo "Released by organism-release-bot on $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
          echo "" >> "$REPORT"

          echo "## 📊 System Metrics" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Component | Count |" >> "$REPORT"
          echo "|-----------|-------|" >> "$REPORT"
          echo "| Web Workers | $(ls organism/web/*-worker.js 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| Cloudflare AGI Brains | $(ls organism/cloudflare/*.js 2>/dev/null | grep -v index.js | wc -l) |" >> "$REPORT"
          echo "| Julia Engines | $(ls src/engines/*.jl 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| Language Specs | $(ls languages/*.spec 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "| ICP Canisters | $(grep -c '^\s*-' icp.yaml 2>/dev/null || echo 0) |" >> "$REPORT"
          echo "| Bot Fleet Workflows | $(ls .github/workflows/organism-*.yml 2>/dev/null | wc -l) |" >> "$REPORT"
          echo "" >> "$REPORT"

          if [ -n "$PREV_TAG" ]; then
            echo "## 📝 Changes since $PREV_TAG" >> "$REPORT"
            echo "" >> "$REPORT"
            git log --oneline "$PREV_TAG..HEAD" | while read line; do
              echo "- $line" >> "$REPORT"
            done
          else
            echo "## 📝 Initial Release" >> "$REPORT"
            echo "" >> "$REPORT"
            echo "First tagged release of MERIDIANUS Organism." >> "$REPORT"
          fi

          echo "" >> "$REPORT"
          echo "## 📦 Release Artifacts" >> "$REPORT"
          echo "" >> "$REPORT"
          echo "| Artifact | Description |" >> "$REPORT"
          echo "|----------|-------------|" >> "$REPORT"
          for f in dist/release/*; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "| $(basename $f) | $SIZE |" >> "$REPORT"
          done

          # Store changelog body for release
          cat "$REPORT" > /tmp/changelog_body.md

      - name: 🚀 Upload Release Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: organism-release
          path: dist/release/
          retention-days: 90

      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "🚀 MERIDIANUS ${{ github.ref_name }} — Sovereign Organism Release"
          body_path: /tmp/changelog_body.md
          files: dist/release/*
          draft: false
          prerelease: false

      - name: 🚀 Summary
        run: |
          echo "## 🚀 Organism Release Bot" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Release: ${GITHUB_REF_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/release/*; do
            echo "| $(basename $f) | $(du -h $f | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done

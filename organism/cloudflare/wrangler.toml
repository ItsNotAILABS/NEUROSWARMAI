# ─── SOVEREIGN SURFACES ──────────────────────────────────────────────────────
# SOVEREIGN's 4 sovereign surfaces — artifact generation + screen observation

[[workers]]
name = "meridianus-sovereign-artifex"
main = "artifex.js"
# ARTIFEX-SOVEREIGN — Artifex Documentorum Soveregni — Artifact Factory
# Routes: POST /generate/pdf  /generate/xlsx  /generate/pack
#         POST /session/start  /session/update  /session/close
#         GET  /status  /metrics
# PROTO-100–109 | PDF=ISO 32000-1 | XLSX=ECMA-376 OOXML | ZIP=PKZIP 2.0
# No external deps — pure Web API + typed arrays

[[workers]]
name = "meridianus-sovereign-speculum"
main = "speculum.js"
# SPECULUM-SOVEREIGN — Speculum Conscientiae Soveregni — Screen Observation Gateway
# Routes: POST /consent/request  /consent/revoke  /capture/submit
#         GET  /session/:id  /audit/:sessionId  /status  /metrics
# PROTO-110–119 | HMAC-SHA256 consent tokens | phi-decay TTL | full audit trail
# No passive capture. No frame storage. Revocation in ≤873ms (1 beat).
# Requires Cloudflare secret: SPECULUM_SECRET

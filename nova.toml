tool_count      = 20
ais_count       = 10
multimodal_count = 5
namespace       = "nova"
call_syntax     = "nova.call('<tool-name>', payload)"
query_syntax    = "nova.query({ name, category, fib_index })"

# ─── NATIVE RUNTIME ─────────────────────────────────────────────────────────
[runtime]
entry           = "nova/runtime/nova-runtime.js"
port            = 8973          # φ-harmonic port: 8+9+7+3=27=3³, 89+73=162≈100φ
host            = "0.0.0.0"
streams         = true
sse             = true
phi_beat_ms     = 873
agent_stream    = "nova/runtime/agent-stream.js"
workflow_bridge = "nova/runtime/workflow-bridge.js"

[runtime.endpoints]
health          = "GET /health"
tools_list      = "GET /tools"
